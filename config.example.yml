# Telegram bot API key (required)
telegram:
  api_key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Shared FTP server — all FTP traps connect here, identified by credentials.
ftp:
  enabled: true
  bind_host: "0.0.0.0"
  bind_port: 21
  public_ip: "1.2.3.4"        # public IP for passive mode (PASV)
  passive_ports: "4100-4199"   # passive port range

# Shared SMTP server — all SMTP traps connect here, identified by credentials.
smtp:
  enabled: false
  bind_host: "0.0.0.0"
  bind_port: 25

# Web interface (trap management + photo history)
web:
  bind_host: "0.0.0.0"
  bind_port: 8080
  # Leave both empty to disable login.
  username: "admin"
  password: "changeme"

# SQLite database path
db_path: "./data/suntek.db"

# Directory where received photos are saved
photos_dir: "./data/photos"
